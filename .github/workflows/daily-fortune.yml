name: Daily Fortune Telegram

on:
  schedule:
    # 매일 한국시간 오전 7:30 (UTC 22:30 전날)
    - cron: '30 22 * * *'
  workflow_dispatch:  # 수동 실행 버튼도 추가

jobs:
  send-fortune:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Send daily fortune to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          cd fortune
          node python/daily_telegram.mjs
