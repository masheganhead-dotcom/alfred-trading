<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>사주 엔진 테스트</title>
<style>
body{font-family:monospace;background:#0a0a10;color:#e8e8ee;padding:20px;line-height:1.6}
h1{color:#d4af37}
.pass{color:#00e676}
.fail{color:#ff5252;font-weight:bold}
.case{border:1px solid #333;padding:12px;margin:8px 0;border-radius:6px}
.han{font-size:18px;color:#d4af37}
.note{color:#888;font-size:12px}
</style>
</head>
<body>
<h1>사주 엔진 자동 테스트</h1>
<div id="out"></div>
<script type="module">
import { calculateSaju, CHEONGAN, JIJI } from "../core/saju.js";
import { coinDivination } from "../core/iching.js";
import { drawSpread } from "../core/tarot.js";
import { analyzeGunghap } from "../core/gunghap.js";

const out = document.getElementById("out");
let passed = 0, failed = 0;

function test(name, fn) {
  const div = document.createElement("div");
  div.className = "case";
  try {
    const result = fn();
    if (result === true || result.ok) {
      div.innerHTML = `<span class="pass">✓ PASS</span> ${name}<br><span class="note">${result.note || ""}</span>`;
      passed++;
    } else {
      div.innerHTML = `<span class="fail">✗ FAIL</span> ${name}<br><span class="note">${result.note || JSON.stringify(result)}</span>`;
      failed++;
    }
  } catch (e) {
    div.innerHTML = `<span class="fail">✗ ERROR</span> ${name}<br><span class="note">${e.message}</span>`;
    failed++;
  }
  out.appendChild(div);
}

// === 사주 케이스 (Python 검증과 일치 확인) ===
test("2024-01-01 12:00 (입춘 전) → 계묘년", () => {
  const s = calculateSaju({year:2024, month:1, day:1, hour:12, gender:"M", useTrueSolarTime:false});
  return {ok: s.pillars.year.gapja === "癸卯" && s.sajuYear === 2023,
          note: `결과: ${s.pillars.year.gapja} / saju_year=${s.sajuYear}`};
});

test("2024-02-05 12:00 (입춘 후) → 갑진년", () => {
  const s = calculateSaju({year:2024, month:2, day:5, hour:12, gender:"M", useTrueSolarTime:false});
  return {ok: s.pillars.year.gapja === "甲辰" && s.sajuYear === 2024,
          note: `결과: ${s.pillars.year.gapja}`};
});

test("1990-05-15 12:00 진태양시 보정 → 경오년 신사월 병오일 갑오시", () => {
  const s = calculateSaju({year:1990, month:5, day:15, hour:12, gender:"M"});
  const expected = "庚午辛巳丙午甲午";
  const actual = s.pillars.year.gapja + s.pillars.month.gapja + s.pillars.day.gapja + s.pillars.hour.gapja;
  return {ok: actual === expected, note: `기대: ${expected} / 실제: ${actual}`};
});

test("자시 처리: 23:30 출생은 그날 일주 (다음날 X)", () => {
  const s = calculateSaju({year:2024, month:6, day:15, hour:23, minute:30, useTrueSolarTime:false});
  return {ok: s.pillars.hour.branch === 0, note: `시지: ${JIJI[s.pillars.hour.branch]} (자=0)`};
});

test("십신: 갑목 일간에 경금은 편관", () => {
  // 1984-02-05 = 갑자년, 일간이 甲(0)이면 庚(6)은 편관
  const s = calculateSaju({year:1984, month:2, day:5, hour:12, useTrueSolarTime:false});
  // 일간 강제 검증 어렵지만 sipsin 함수 동작 확인용
  return {ok: typeof s.sipsin === "object", note: `구조 OK`};
});

test("오행 분포 합계 = 8 (4간 + 4지)", () => {
  const s = calculateSaju({year:1990, month:5, day:15, hour:12, useTrueSolarTime:false});
  const total = Object.values(s.ohaengCount).reduce((a, b) => a + b, 0);
  return {ok: total === 8, note: `합계: ${total}, 분포: ${JSON.stringify(s.ohaengCount)}`};
});

test("대운 10개 산출", () => {
  const s = calculateSaju({year:1990, month:5, day:15, hour:12, gender:"M"});
  return {ok: s.daewoon.list.length === 10, note: `대운수: ${s.daewoon.startAge}세, 방향: ${s.daewoon.forward?"순행":"역행"}`};
});

// === 주역 ===
test("주역 동전점: 6효 산출", () => {
  const r = coinDivination();
  return {ok: r.lines.length === 6 && r.primary.number >= 1 && r.primary.number <= 64,
          note: `괘번호: ${r.primary.number} / 동효: ${r.movingLines.length}개`};
});

// === 타로 ===
test("타로 3장 스프레드", () => {
  const cards = drawSpread(3);
  return {ok: cards.length === 3 && cards.every(c => c.type), note: `${cards.map(c => c.type === 'major' ? `M${c.n}` : `${c.suit}/${c.rank}`).join(", ")}`};
});

// === 궁합 ===
test("궁합 종합 점수 0~100 범위", () => {
  const a = calculateSaju({year:1990, month:3, day:20, hour:10, gender:"M"});
  const b = calculateSaju({year:1992, month:7, day:11, hour:14, gender:"F"});
  const r = analyzeGunghap(a, b);
  return {ok: r.total >= 0 && r.total <= 100, note: `점수: ${r.total} (${r.grade.grade})`};
});

// 결과
const summary = document.createElement("h2");
summary.innerHTML = `<span style="color:#00e676">${passed} PASS</span> / <span style="color:${failed>0?'#ff5252':'#888'}">${failed} FAIL</span>`;
out.appendChild(summary);
</script>
</body>
</html>
